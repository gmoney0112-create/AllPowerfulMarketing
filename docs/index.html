function App(){

  const [scrolled,setScrolled]=useState(false);
  const [form,setForm]=useState({name:'',email:'',phone:'',service:'',message:''});
  const [status,setStatus]=useState('');

  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>20);
    window.addEventListener('scroll',fn);
    return ()=>window.removeEventListener('scroll',fn);
  },[]);

  const go=(p)=>{setPage(p);setSvc(null);setMenuOpen(false);window.scrollTo({top:0,behavior:'smooth'});};
  const openSvc=(id)=>{setSvc(id);setPage('home');window.scrollTo({top:0,behavior:'smooth'});};
  const closeSvc=()=>{setSvc(null);window.scrollTo({top:0,behavior:'smooth'});};

  const onSubmit=(e)=>{e.preventDefault();setStatus('sending');setTimeout(()=>setStatus('success'),1200);};

            <span className="text-white font-bold text-xl tracking-tight">All Powerful Marketing</span>
          </button>
          <div className="hidden md:flex items-center gap-8">
            {['home','services','about','contact'].map(p=>(

          </div>
          <button className="md:hidden text-slate-300" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<XIcon/>:<MenuIcon/>}</button>
        </div>
      </div>

        <div className="md:hidden bg-slate-900 border-t border-slate-800 px-4 py-3 space-y-1">

            <button key={p} onClick={()=>go(p)} className={`block w-full text-left px-3 py-2 rounded-lg capitalize text-sm font-medium ${page===p?'bg-amber-500/10 text-amber-400':'text-slate-300 hover:bg-slate-800'}`}>{p}</button>
          ))}

  const ContactForm=({compact=false})=>(
    <form onSubmit={onSubmit}>
      <div className={`grid gap-4 ${compact?'grid-cols-1':'grid-cols-1 sm:grid-cols-2'}`}>
        <input name="name" value={form.name} onChange={onChange} required placeholder="Your Name" className="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-400 focus:outline-none focus:border-amber-500"/>
        <input name="email" type="email" value={form.email} onChange={onChange} required placeholder="Email Address" className="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-400 focus:outline-none focus:border-amber-500"/>
        <input name="phone" type="tel" value={form.phone} onChange={onChange} placeholder="Phone Number" className="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-400 focus:outline-none focus:border-amber-500"/>
        <select name="service" value={form.service} onChange={onChange} className="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-amber-500">

        <div className="pt-16">
          <div className={`bg-gradient-to-br ${s.grad} py-16 px-4`}>
            <div className="max-w-4xl mx-auto text-center">
              <div className="inline-flex items-center gap-2 bg-white/20 text-white px-3 py-1 rounded-full text-sm font-medium mb-6"><SI cls="w-4 h-4"/>{s.title}</div>
              <h1 className="text-3xl sm:text-5xl font-black text-white mb-4">{d.tagline}</h1>
              <p className="text-white/90 text-lg max-w-2xl mx-auto">{d.hero}</p>
              <button onClick={()=>go('contact')} className="mt-8 bg-white text-slate-900 font-bold px-8 py-3 rounded-xl hover:bg-slate-100 inline-flex items-center gap-2">Get Started <ArrowRight/></button>
            </div>
          </div>
          <div className="max-w-4xl mx-auto px-4 py-16">
            <div className="grid md:grid-cols-2 gap-12">
              <div>
                <h2 className="text-2xl font-bold text-slate-900 mb-4">What We Do</h2>
                <p className="text-slate-600 leading-relaxed mb-8">{d.intro}</p>
                <h3 className="text-xl font-bold text-slate-900 mb-4">What's Included</h3>
                <ul className="space-y-3">{d.includes.map((item,i)=>(<li key={i} className="flex items-start gap-3"><Check cls={`w-5 h-5 ${s.accent} flex-shrink-0 mt-0.5`}/><span className="text-slate-700 text-sm">{item}</span></li>))}</ul>
              </div>
              <div>
                <div className={`${s.bg} ${s.border} border rounded-2xl p-6 mb-6`}>
                  <h3 className={`text-lg font-bold ${s.accent} mb-4`}>Who This Is For</h3>
                  <ul className="space-y-2">{d.useCases.map((uc,i)=>(<li key={i} className="flex items-start gap-2 text-slate-700 text-sm"><ChevR cls={`w-4 h-4 ${s.accent} flex-shrink-0 mt-0.5`}/>{uc}</li>))}</ul>
                </div>
                <div className="bg-slate-900 rounded-2xl p-6">
                  <h3 className="text-lg font-bold text-white mb-3">Why All Powerful Marketing</h3>
                  <p className="text-slate-300 text-sm leading-relaxed">{d.why}</p>
                  <button onClick={()=>go('contact')} className="mt-4 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-semibold px-5 py-2.5 rounded-lg text-sm hover:from-amber-400 hover:to-orange-400 inline-flex items-center gap-2">Request a Free Quote <ArrowRight/></button>
                </div>
              </div>
            </div>
            <div className="mt-12 text-center"><button onClick={closeSvc} className="text-slate-500 hover:text-slate-700 text-sm underline">&#8592; Back to All Services</button></div>
          </div>
        </div>
        <Footer/>
